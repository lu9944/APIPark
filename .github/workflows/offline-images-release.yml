name: Offline Docker Images Release

"on":
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture (amd64 / arm64)"
        required: true
        type: choice
        default: amd64
        options:
          - amd64
          - arm64

permissions:
  contents: write

env:
  IMAGE_LIST: >-
    mysql:8.0.37
    apipark/apipark:v1.2.0-beta
    influxdb:2.6
    redis:7.2.4
    eolinker/apinto-gateway:latest

jobs:
  offline-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure arch
        id: arch
        run: |
          ARCH="${{ github.event.inputs.arch }}"
          echo "platform=linux/${ARCH}" >> "$GITHUB_OUTPUT"
          echo "arch=${ARCH}" >> "$GITHUB_OUTPUT"

      - name: Pull images
        run: |
          PLATFORM="${{ steps.arch.outputs.platform }}"
          for img in $IMAGE_LIST; do
            echo "=== Pulling ${img} (${PLATFORM}) ==="
            docker pull --platform "${PLATFORM}" "${img}"
          done

      - name: Show pulled images
        run: docker images

      - name: Prepare offline package
        run: |
          ARCH="${{ steps.arch.outputs.arch }}"
          PKG_NAME="apipark-offline-images-${ARCH}"
          WORKDIR="./${PKG_NAME}"
          mkdir -p "${WORKDIR}/images"

          # Save each image individually (easier partial import)
          for img in $IMAGE_LIST; do
            # Convert image name to safe filename
            safe=$(echo "${img}" | tr '/:' '__')
            echo "Saving ${img} -> images/${safe}.tar"
            docker save -o "${WORKDIR}/images/${safe}.tar" "${img}"
          done

          # Copy docker-compose.yml (strip obsolete 'version' key) and load script
          sed '/^version:/d' scripts/docker-compose.yml > "${WORKDIR}/docker-compose.yml"
          cp .github/workflows/scripts/load-images.sh "${WORKDIR}/"

          # Generate apinto gateway config.yml (required by docker-compose mount)
          cat > "${WORKDIR}/config.yml" <<'APINTO_CONFIG'
version: 2
#certificate:
#  dir: /etc/apinto/cert
client:
  advertise_urls:
    - http://apipark-apinto:9400
  listen_urls:
    - http://0.0.0.0:9400
gateway:
  advertise_urls:
    - http://apipark-apinto:8099
    - https://apipark-apinto:8099
  listen_urls:
    - https://0.0.0.0:8099
    - http://0.0.0.0:8099
peer:
  listen_urls:
    - http://0.0.0.0:9401
  advertise_urls:
    - http://apipark-apinto:9401
APINTO_CONFIG

          # Write image list manifest
          echo "${IMAGE_LIST}" | tr ' ' '\n' | sed '/^$/d' > "${WORKDIR}/images.txt"

          # Compress
          tar -czf "${PKG_NAME}.tar.gz" -C . "${PKG_NAME}"

          # Generate checksum
          sha256sum "${PKG_NAME}.tar.gz" > "${PKG_NAME}.tar.gz.sha256"

          # Show size
          ls -lh "${PKG_NAME}.tar.gz" "${PKG_NAME}.tar.gz.sha256"

      - name: Generate tag name
        id: tag
        run: |
          ARCH="${{ steps.arch.outputs.arch }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=offline-images-${ARCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Offline Docker Images (${{ steps.arch.outputs.arch }})"
          body: |
            ## Offline Docker Images Package

            **Architecture:** `${{ steps.arch.outputs.arch }}`

            ### Included Images
            - mysql:8.0.37
            - apipark/apipark:v1.2.0-beta
            - influxdb:2.6
            - redis:7.2.4
            - eolinker/apinto-gateway:latest

            ### Usage (offline import)

            1. Download `apipark-offline-images-*.tar.gz`
            2. Extract:
               ```bash
               tar -xzf apipark-offline-images-*.tar.gz
               ```
            3. Load images into Docker:
               ```bash
               cd apipark-offline-images-*/
               chmod +x load-images.sh
               ./load-images.sh
               ```
            4. Start the project:
               ```bash
               docker compose -f docker-compose.yml up -d
               ```
          files: |
            apipark-offline-images-*.tar.gz
            apipark-offline-images-*.tar.gz.sha256
          prerelease: true
